# CLIProxyAPIPlus Workflow Add Or Update Model In Registry

## Action

Follow the add-or-update-model-in-registry workflow:
1. Edit internal/registry/model_definitions.go to add or update model definition.
2. Update or add tests in internal/registry/model_definitions_test.go.
3. If endpoint routing is affected, update sdk/api/handlers/openai/endpoint_compat.go.
4. Update or add tests in sdk/api/handlers/openai/endpoint_compat_test.go.
5. If executor logic is affected, update internal/runtime/executor/github_copilot_executor.go and its tests.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: internal/registry/model_definitions.go, internal/registry/model_definitions_test.go, sdk/api/handlers/openai/endpoint_compat.go

